kind = "web"
previewPath = "/"
title = "CariKos"
version = "1.0.0"
id = "artifacts/cari-kos"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20386

[services.development]
run = "pnpm --filter @workspace/cari-kos run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cari-kos", "run", "build" ]
serve = "static"
publicDir = "artifacts/cari-kos/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20386"
BASE_PATH = "/"
